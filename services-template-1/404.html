      color: var(--text-dark);
    }
    .error-desc {
      max-width: 480px;
      margin: 0 auto 32px;
      color: var(--text-medium);
      font-size: 1.05rem;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
