<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Timeless Relocation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { navy: '#0A192F', coral: '#FF5722', light: '#F8FAFC', gray: '#64748B' } }, fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    
    <style>
        body { background-color: #0A192F; color: #F8FAFC; overflow: hidden; }
        .glitch { position: relative; color: white; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch::before { left: 2px; text-shadow: -2px 0 red; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim-2 3s infinite linear alternate-reverse; }
        .glitch::after { left: -2px; text-shadow: -2px 0 blue; clip: rect(85px, 550px, 140px, 0); animation: glitch-anim 2.5s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip: rect(27px, 9999px, 86px, 0); } 20% { clip: rect(74px, 9999px, 55px, 0); } 40% { clip: rect(100px, 9999px, 20px, 0); } 60% { clip: rect(32px, 9999px, 60px, 0); } 80% { clip: rect(9px, 9999px, 107px, 0); } 100% { clip: rect(110px, 9999px, 16px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 20% { clip: rect(12px, 9999px, 86px, 0); } 40% { clip: rect(52px, 9999px, 11px, 0); } 60% { clip: rect(8px, 9999px, 83px, 0); } 80% { clip: rect(107px, 9999px, 2px, 0); } 100% { clip: rect(98px, 9999px, 62px, 0); } }
        .reveal-up { opacity: 0; transform: translateY(40px); }
    </style>
</head>
<body class="antialiased font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full z-50 top-0 py-6 px-10 flex justify-between items-center text-white absolute">
        <a href="index.html" class="text-2xl font-serif font-bold tracking-wider"><img src="images/Timeless_Logo.png" alt="Timeless Relocation Logo" width="130" height="54" style="object-fit: contain;"></a>
        <nav class="hidden md:flex space-x-12 font-medium tracking-wide">
            <a href="index.html" class="hover:text-brand-coral transition-colors">Home</a>
            <a href="about.html" class="hover:text-brand-coral transition-colors">About</a>
            <a href="contact.html" class="hover:text-brand-coral transition-colors">Contact</a>
        </nav>
    </header>

    <!-- 404 Content -->
    <main class="flex-grow flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 bg-brand-navy z-0">
            <!-- Background floating boxes -->
            <div id="floating-boxes" class="absolute inset-0 opacity-10"></div>
        </div>
        
        <div class="container mx-auto px-6 text-center z-10">
            <h1 class="font-serif text-[10rem] md:text-[15rem] leading-none mb-4 glitch" data-text="404" style="animation: fadeUp 1s ease forwards">404</h1>
            <h2 class="text-3xl md:text-5xl text-brand-coral font-serif mb-6 reveal-up">Looks like you're lost.</h2>
            <p class="text-brand-gray text-xl mb-12 max-w-2xl mx-auto reveal-up">The page you are looking for might have been moved, deleted, or possibly never existed.</p>
            
            <div class="reveal-up">
                <a href="index.html" class="inline-block bg-brand-coral text-white px-10 py-5 rounded-full font-bold hover:bg-white hover:text-brand-navy transition-colors">Return to Home</a>
            </div>
        </div>
    </main>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simple GSAP Reveal 
            gsap.to('.reveal-up', { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: "power3.out", delay: 0.5 });
            
            // Floating boxes background effect
            const container = document.getElementById('floating-boxes');
            for(let i=0; i<15; i++) {
                let box = document.createElement('div');
                box.innerHTML = '📦';
                box.style.position = 'absolute';
                box.style.fontSize = (Math.random() * 4 + 2) + 'rem';
                box.style.left = Math.random() * 100 + 'vw';
                box.style.top = Math.random() * 100 + 'vh';
                box.style.filter = 'grayscale(100%)';
                container.appendChild(box);
                
                gsap.to(box, {
                    y: "-=100", 
                    x: "+=" + (Math.random() * 50 - 25),
                    rotation: Math.random() * 360,
                    duration: Math.random() * 5 + 5,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }
        });
    </script>
    <style>.whatsapp-float{position:fixed;bottom:28px;right:28px;z-index:9999}.whatsapp-float a{display:flex;align-items:center;justify-content:center;width:64px;height:64px;background:#25D366;border-radius:50%;box-shadow:0 6px 24px rgba(37,211,102,0.4);color:white;transition:transform 0.3s}.whatsapp-float a:hover{transform:scale(1.1)}</style>

    </div>
</body>
</html>
