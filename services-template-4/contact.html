    <!-- JS Form Submit & Observer -->
    <script>
        document.getElementById('waForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const service = document.getElementById('service').value;
            const msg = `Hello Your Company, I am ${name}. I am inquiring regarding: ${service}.`;
            window.open(`https://wa.me/11011112222?text=${encodeURIComponent(msg)}`, '_blank');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.reveal-up');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.transition = "all 1s cubic-bezier(0.25, 1, 0.5, 1)";
                        entry.target.style.opacity = "1";
                        entry.target.style.transform = "translateY(0)";
                    }
                });
            }, { threshold: 0.1 });
            elements.forEach(el => observer.observe(el));
        });
    </script>
